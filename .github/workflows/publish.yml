name: Publish to npm

# Publishes every publishable @e-sig workspace package to the public npm
# registry via OIDC Trusted Publishing — no npm token, no repo secret. npm
# mints short-lived credentials from the workflow's OIDC identity, and
# provenance (Sigstore) is generated automatically once the repo is public.
#
# One-time setup (owner), per package on npmjs.com → package → Settings →
# Trusted Publisher → GitHub Actions:
#   Organization or user: vmvtech
#   Repository:           esig-suite
#   Workflow filename:    publish.yml
#   Environment:          (leave blank)
# Then bump versions and publish a GitHub Release (or run this workflow
# manually via "Run workflow").

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC — required for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1 (Node 22 bundles npm 10).
      - run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run smoke
      # Gate: verify BEFORE anything is published that every publishable
      # workspace name already exists on the registry (OIDC trusted publishing
      # cannot first-publish a NEW name — publish new packages once manually
      # with a granular token, configure their Trusted Publisher
      # (vmvtech / esig-suite / publish.yml), then this workflow takes over)
      # and that at least one workspace has a new version. A failure here
      # leaves the registry untouched instead of half-released.
      - name: Publish preflight (registry gate)
        run: node scripts/publish-preflight.mjs
      # Validate packing (files list, prepublishOnly) without touching npm.
      - name: Pack dry-run
        run: npm publish --dry-run --workspaces
      # Publishes workspaces dependencies-first, skipping versions already on
      # the registry — re-running after a partial failure converges instead of
      # dying on the first already-published package. Dist-tags come from each
      # package's publishConfig.tag (e.g. @e-sig/uaid-exch → preview).
      - name: Publish packages
        run: node scripts/publish-preflight.mjs --publish
